name: CPU smoke test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  cpu-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
      - run: uv sync --locked
      - run: uv lock --check
      - run: uv run python -c "import langchain, langgraph, faiss, streamlit"
      - run: uv run pytest
